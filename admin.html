<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Cecy Perales</title>
    <link rel="icon" type="image/jpeg" href="Logo.jpeg">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #e9ecef; color: #444; }
        .mobile-container { max-width: 420px; margin: 20px auto; background: white; min-height: 95vh; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }
        .header-admin { background-color: #333; color: white; text-align: center; padding: 25px 15px; }
        .header-admin h2 { margin: 0; font-size: 24px; font-weight: 500; letter-spacing: 0.5px; }
        .header-admin p { margin: 5px 0 0 0; font-size: 14px; color: #d66b8d; font-weight: bold; }
        .oculto { display: none !important; }
        .pad-20 { padding: 20px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 25px; background: #f5f5f5; padding: 5px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 10px 5px; border: none; background: transparent; border-radius: 6px; cursor: pointer; font-weight: bold; color: #777; font-size: 13px; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: white; color: #d66b8d; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        label { display: block; font-size: 14px; font-weight: bold; color: #666; margin-bottom: 8px; margin-top: 20px; }
        input[type="email"], input[type="password"], input[type="date"], input[type="time"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: #fcfcfc; }
        .btn-main { background-color: #d66b8d; color: white; border: none; padding: 15px; font-size: 16px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .btn-logout { background-color: #ffefef; color: #cc0000; border: 1px solid #ffcccc; padding: 10px; font-size: 14px; border-radius: 6px; width: 100%; cursor: pointer; margin-bottom: 25px; font-weight: bold; }
        .calendario-selector { background: #fdf2f5; padding: 15px; border-radius: 8px; border: 1px solid #fae3ea; margin-bottom: 20px; text-align: center; }
        .calendario-selector h4 { margin: 0 0 10px 0; color: #b85273; font-size: 15px; }
        .cita-card { background: white; border: 1px solid #eee; border-left: 5px solid #ffb3c6; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.04); }
        .cita-card.confirmada { border-left-color: #25D366; background-color: #fbfffb; }
        .cita-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 10px; }
        .cita-nombre { font-size: 16px; font-weight: bold; color: #333; margin: 0; }
        .cita-hora-badge { font-size: 15px; color: white; background: #d66b8d; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        .cita-servicios { font-size: 14px; color: #555; margin: 0 0 10px 0; line-height: 1.5; }
        .cita-acciones { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn-confirmar { background: #25D366; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .acciones-rojas { display: flex; gap: 8px; }
        .btn-cancelar { background: #ff4d4d; color: white; border: none; padding: 10px; border-radius: 5px; flex: 1; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-liberar { background: #ff9900; color: white; border: none; padding: 10px; border-radius: 5px; flex: 1; font-weight: bold; cursor: pointer; font-size: 12px; }
        .horarios-wrapper { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-top: 10px; }
        .horario-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #eee; }
        .btn-eliminar-hora { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .mensaje-vacio { text-align: center; color: #999; font-size: 14px; padding: 40px 0; font-style: italic; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="header-admin">
        <h2>Panel de Control</h2>
        <p>Sistema de Reservas</p>
    </div>

    <div class="pad-20">
        <div id="seccion-login">
            <p style="text-align: center; color: #666; margin-bottom: 20px;">Ingresa para gestionar tu agenda</p>
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@correo.com">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
            <button id="btn-login" class="btn-main">Entrar al Panel</button>
        </div>

        <div id="seccion-panel" class="oculto">
            <button id="btn-logout" class="btn-logout">Cerrar Sesión</button>
            
            <div class="tabs">
                <button id="tab-agenda" class="tab-btn active">Agenda 📅</button>
                <button id="tab-solicitudes" class="tab-btn">Pendientes ⏳</button>
                <button id="tab-horarios" class="tab-btn">Abrir Horas ⏰</button>
            </div>

            <div id="vista-agenda">
                <div class="calendario-selector">
                    <h4>📅 Ver Agenda del día:</h4>
                    <input type="date" id="filtro-fecha-agenda">
                </div>
                <div id="lista-agenda-container">
                    <div class="mensaje-vacio">Selecciona una fecha para ver tus citas.</div>
                </div>
            </div>

            <div id="vista-solicitudes" class="oculto">
                <h3 style="margin-top: 0; color: #333; font-size: 18px;">Solicitudes Nuevas</h3>
                <p style="font-size: 13px; color: #888; margin-top: -10px;">Estas clientas agendaron pero aún no confirman pago.</p>
                <div id="lista-solicitudes-container">
                    <div class="mensaje-vacio">Cargando solicitudes...</div>
                </div>
            </div>

            <div id="vista-horarios" class="oculto">
                <h3 style="margin-top: 0; color: #333; font-size: 18px;">Gestión de Disponibilidad</h3>
                <label>1. Elige el día</label>
                <input type="date" id="fecha-seleccionada">
                <label>2. Agrega una hora</label>
                <input type="time" id="nueva-hora">
                <button id="btn-agregar-hora" class="btn-main" style="margin-top: 15px;">+ Abrir Horario</button>
                <hr>
                <label>📋 Visibilidad en la página web:</label>
                
                <button id="btn-toggle-dia" class="btn-main" style="margin-top: 0px; margin-bottom: 15px; display: none; padding: 12px; font-size: 15px;"></button>
                
                <div class="horarios-wrapper" id="lista-horarios"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDNjqux_hDFWfflfF4FhDh7cNmh3W5oRVQ",
        authDomain: "depilacion-reservas.firebaseapp.com",
        projectId: "depilacion-reservas",
        storageBucket: "depilacion-reservas.firebasestorage.app",
        messagingSenderId: "246526216829",
        appId: "1:246526216829:web:324c7887234eb9a9ce7f14",
        measurementId: "G-5Q500M6E14"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const seccionLogin = document.getElementById('seccion-login');
    const seccionPanel = document.getElementById('seccion-panel');
    const btnLogin = document.getElementById('btn-login');
    const btnLogout = document.getElementById('btn-logout');
    
    const tabAgenda = document.getElementById('tab-agenda');
    const tabSolicitudes = document.getElementById('tab-solicitudes');
    const tabHorarios = document.getElementById('tab-horarios');
    
    const vistaAgenda = document.getElementById('vista-agenda');
    const vistaSolicitudes = document.getElementById('vista-solicitudes');
    const vistaHorarios = document.getElementById('vista-horarios');

    const filtroFechaAgenda = document.getElementById('filtro-fecha-agenda');
    const listaAgendaContainer = document.getElementById('lista-agenda-container');
    const listaSolicitudesContainer = document.getElementById('lista-solicitudes-container');

    const fechaInput = document.getElementById('fecha-seleccionada');
    const horaInput = document.getElementById('nueva-hora');
    const btnAgregarHora = document.getElementById('btn-agregar-hora');
    const listaHorarios = document.getElementById('lista-horarios');
    const btnToggleDia = document.getElementById('btn-toggle-dia');

    let diaActivo = true;

    tabAgenda.addEventListener('click', () => { activarPestaña(tabAgenda, vistaAgenda); cargarCitas(); });
    tabSolicitudes.addEventListener('click', () => { activarPestaña(tabSolicitudes, vistaSolicitudes); cargarCitas(); });
    tabHorarios.addEventListener('click', () => { activarPestaña(tabHorarios, vistaHorarios); });

    function activarPestaña(boton, vista) {
        [tabAgenda, tabSolicitudes, tabHorarios].forEach(b => b.classList.remove('active'));
        [vistaAgenda, vistaSolicitudes, vistaHorarios].forEach(v => v.classList.add('oculto'));
        boton.classList.add('active');
        vista.classList.remove('oculto');
    }

    btnLogin.addEventListener('click', async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); } 
        catch (e) { alert("Acceso denegado."); }
    });

    btnLogout.addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            seccionLogin.classList.add('oculto');
            seccionPanel.classList.remove('oculto');
            const hoy = new Date().toISOString().split('T')[0];
            filtroFechaAgenda.value = hoy;
            fechaInput.value = hoy;
            cargarCitas();
            cargarHorariosDisponibles();
        } else {
            seccionLogin.classList.remove('oculto');
            seccionPanel.classList.add('oculto');
        }
    });

    async function cargarCitas() {
        listaAgendaContainer.innerHTML = "<div class='mensaje-vacio'>Cargando...</div>";
        listaSolicitudesContainer.innerHTML = "<div class='mensaje-vacio'>Cargando...</div>";

        try {
            const snapshot = await getDocs(collection(db, "citas"));
            let confirmadasDelDia = [];
            let pendientesGlobales = [];

            snapshot.forEach(doc => {
                const data = { id: doc.id, ...doc.data() };
                if (data.estado === 'confirmado') {
                    if (data.fecha === filtroFechaAgenda.value) confirmadasDelDia.push(data);
                } else {
                    pendientesGlobales.push(data);
                }
            });

            if (confirmadasDelDia.length === 0) {
                listaAgendaContainer.innerHTML = `<div class='mensaje-vacio'>No tienes citas confirmadas para el día ${filtroFechaAgenda.value}.</div>`;
            } else {
                listaAgendaContainer.innerHTML = "";
                confirmadasDelDia.sort((a,b) => a.hora.localeCompare(b.hora)).forEach(cita => {
                    listaAgendaContainer.innerHTML += generarHTMLTarjeta(cita, true);
                });
            }

            if (pendientesGlobales.length === 0) {
                listaSolicitudesContainer.innerHTML = "<div class='mensaje-vacio'>No hay solicitudes de pago pendientes.</div>";
            } else {
                listaSolicitudesContainer.innerHTML = "";
                pendientesGlobales.sort((a,b) => a.fecha.localeCompare(b.fecha)).forEach(cita => {
                    listaSolicitudesContainer.innerHTML += generarHTMLTarjeta(cita, false);
                });
            }
        } catch (e) { console.error(e); }
    }

    function generarHTMLTarjeta(cita, esAgenda) {
        return `
            <div class="cita-card ${esAgenda ? 'confirmada' : ''}">
                <div class="cita-header">
                    <h4 class="cita-nombre">👤 ${cita.nombre}</h4>
                    <span class="cita-hora-badge">${cita.hora}</span>
                </div>
                ${!esAgenda ? `<p style="font-size:12px; color:#d66b8d; font-weight:bold; margin-bottom:5px;">📅 Fecha: ${cita.fecha}</p>` : ''}
                <p class="cita-servicios">✨ <b>Servicios:</b> ${cita.servicios}</p>
                <div class="cita-acciones">
                    ${!esAgenda ? `<button class="btn-confirmar" onclick="confirmarPago('${cita.id}')">✓ Confirmar Pago</button>` : ''}
                    <div class="acciones-rojas">
                        <button class="btn-cancelar" onclick="eliminarCita('${cita.id}', '${cita.nombre}')">❌ Borrar</button>
                        <button class="btn-liberar" onclick="liberarCita('${cita.id}', '${cita.fecha}', '${cita.hora}', '${cita.nombre}')">🔓 Cancelar y Liberar Hora</button>
                    </div>
                </div>
            </div>
        `;
    }

    window.confirmarPago = async (id) => {
        if (!confirm("¿Confirmas que ya recibiste el anticipo?")) return;
        await updateDoc(doc(db, "citas", id), { estado: "confirmado" });
        cargarCitas();
    };

    window.eliminarCita = async (id, nombre) => {
        if (!confirm(`¿Borrar cita de ${nombre}? No se abrirá el horario en la web.`)) return;
        await deleteDoc(doc(db, "citas", id));
        cargarCitas();
    };

    window.liberarCita = async (id, fecha, hora, nombre) => {
        if (!confirm(`¿Cancelar cita de ${nombre} y abrir la hora ${hora} en la web?`)) return;
        await deleteDoc(doc(db, "citas", id));
        await setDoc(doc(db, "disponibilidad", fecha), { horarios: arrayUnion(hora), activo: true }, { merge: true });
        cargarCitas();
        cargarHorariosDisponibles();
    };

    async function cargarHorariosDisponibles() {
        const f = fechaInput.value;
        if (!f) return;
        listaHorarios.innerHTML = "Cargando...";
        btnToggleDia.style.display = 'none';
        
        const snap = await getDoc(doc(db, "disponibilidad", f));
        listaHorarios.innerHTML = "";
        
        if (snap.exists() && snap.data().horarios?.length > 0) {
            diaActivo = snap.data().activo !== false;
            btnToggleDia.style.display = 'block';

            if (diaActivo) {
                btnToggleDia.innerHTML = "👁️ Ocultar todo este día al público";
                btnToggleDia.style.backgroundColor = "#555";
            } else {
                btnToggleDia.innerHTML = "👁️‍🗨️ Volver a mostrar este día";
                btnToggleDia.style.backgroundColor = "#25D366";
                listaHorarios.innerHTML += `<div class="mensaje-vacio" style="color: #ff4d4d; padding: 5px 0 15px 0; font-weight: bold;">⚠️ Día oculto. Las clientas no pueden agendar hoy.</div>`;
            }

            snap.data().horarios.sort().forEach(h => {
                // AQUÍ ESTÁ EL CAMBIO: El botón ahora dice "Borrar"
                listaHorarios.innerHTML += `<div class="horario-item"><span>${h}</span><button class="btn-eliminar-hora" onclick="quitarHora('${f}','${h}')">Borrar</button></div>`;
            });
        } else { 
            listaHorarios.innerHTML = "<div class='mensaje-vacio'>Sin horarios en la web.</div>"; 
        }
    }

    btnAgregarHora.addEventListener('click', async () => {
        if (!fechaInput.value || !horaInput.value) return;
        await setDoc(doc(db, "disponibilidad", fechaInput.value), { horarios: arrayUnion(horaInput.value), activo: true }, { merge: true });
        horaInput.value = "";
        cargarHorariosDisponibles();
    });

    window.quitarHora = async (f, h) => {
        await updateDoc(doc(db, "disponibilidad", f), { horarios: arrayRemove(h) });
        cargarHorariosDisponibles();
    };

    btnToggleDia.addEventListener('click', async () => {
        const f = fechaInput.value;
        if (!f) return;
        await updateDoc(doc(db, "disponibilidad", f), { activo: !diaActivo });
        cargarHorariosDisponibles();
    });

    filtroFechaAgenda.addEventListener('change', cargarCitas);
    fechaInput.addEventListener('change', cargarHorariosDisponibles);
</script>
</body>
</html>
